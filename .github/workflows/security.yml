name: Security Pipeline

on:
  workflow_dispatch:
    inputs:
      severity_fail:
        description: 'Minimum severity to fail (low, medium, high, critical)'
        default: 'high'
        type: string
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  SEVERITY_FAIL: high

jobs:
  # ── A. Secret Scanning ──────────────────────────────────────────────

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  trufflehog:
    name: Secret Scan (TruffleHog)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (PR — diff only)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --exclude-paths=.github/workflows/.trufflehogignore

      - name: TruffleHog (full repo)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --exclude-paths=.github/workflows/.trufflehogignore

  # ── B. Static Application Security Testing ──────────────────────────

  semgrep:
    name: SAST (Semgrep)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/default
            p/python
            p/typescript
            p/react
            p/owasp-top-ten
            p/jwt
            p/secrets

  codeql:
    name: SAST (CodeQL — ${{ matrix.language }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
        continue-on-error: true

  bandit:
    name: SAST (Bandit — Python)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          pip install bandit

      - name: Run Bandit
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          cd src/backend && bandit -r app/ -f txt --severity-level ${{ env.SEVERITY_FAIL }} || true

  # ── C. Dependency & Supply-Chain Scanning ───────────────────────────

  pip-audit:
    name: Dependency Scan (Python)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install pip-audit
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          pip install pip-audit

      - name: pip-audit
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          cd src/backend && pip-audit -r requirements.txt --desc || true

  npm-audit:
    name: Dependency Scan (Node.js)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: cd src/frontend && npm ci

      - name: npm audit
        run: cd src/frontend && npm audit --audit-level=moderate || true

  dependency-review:
    name: Dependency Review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          vulnerability-check: true

  osv-scanner:
    name: Dependency Scan (OSV — all ecosystems)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install OSV Scanner
        run: |
          OSV_VER=$(curl -sL https://api.github.com/repos/google/osv-scanner/releases/latest | grep '"tag_name"' | head -1 | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -sL "https://github.com/google/osv-scanner/releases/download/v${OSV_VER}/osv-scanner_linux_amd64" -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Scan Python dependencies
        run: osv-scanner --lockfile=./src/backend/requirements.txt --config=.osv-scanner.toml || true

      - name: Scan Node.js dependencies
        run: osv-scanner --lockfile=./src/frontend/package-lock.json --config=.osv-scanner.toml || true

  # ── D. Filesystem / Config / IaC Scanning ────────────────────────────

  trivy-fs:
    name: Filesystem Scan (Trivy)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1
          format: table
          skip-dirs: node_modules,venv,.venv,.next,__pycache__

  trivy-config:
    name: IaC / Misconfig Scan (Trivy)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL
          exit-code: 1
          format: table
          skip-dirs: node_modules,venv,.venv,.next,__pycache__

  checkov:
    name: IaC Scan (Checkov)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,github_actions
          output_format: cli
          soft_fail: true
          skip_check: CKV_DOCKER_3

  # ── E. Container Image Scanning ─────────────────────────────────────

  trivy-image:
    name: Container Image Scan (Trivy)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f infra/docker/Dockerfile.backend -t contentforge-ai:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: contentforge-ai:scan
          severity: CRITICAL
          exit-code: 1
          format: table
          ignore-unfixed: true

  # ── Security Gate Summary ───────────────────────────────────────────

  security-gate:
    name: Security Gate
    if: always()
    runs-on: self-hosted
    needs:
      - gitleaks
      - trufflehog
      - semgrep
      - codeql
      - bandit
      - pip-audit
      - npm-audit
      - osv-scanner
      - trivy-fs
      - trivy-config
      - trivy-image
    steps:
      - name: Check security job results
        env:
          GITLEAKS: ${{ needs.gitleaks.result }}
          TRUFFLEHOG: ${{ needs.trufflehog.result }}
          SEMGREP: ${{ needs.semgrep.result }}
          CODEQL: ${{ needs.codeql.result }}
          BANDIT: ${{ needs.bandit.result }}
          PIP_AUDIT: ${{ needs.pip-audit.result }}
          NPM_AUDIT: ${{ needs.npm-audit.result }}
          OSV_SCANNER: ${{ needs.osv-scanner.result }}
          TRIVY_FS: ${{ needs.trivy-fs.result }}
          TRIVY_CONFIG: ${{ needs.trivy-config.result }}
          TRIVY_IMAGE: ${{ needs.trivy-image.result }}
        run: |
          echo "## Security Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${GITLEAKS} |" >> $GITHUB_STEP_SUMMARY
          echo "| TruffleHog | ${TRUFFLEHOG} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep | ${SEMGREP} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${CODEQL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | ${BANDIT} |" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit | ${PIP_AUDIT} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm-audit | ${NPM_AUDIT} |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV Scanner | ${OSV_SCANNER} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS | ${TRIVY_FS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Config | ${TRIVY_CONFIG} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image | ${TRIVY_IMAGE} |" >> $GITHUB_STEP_SUMMARY

          FAILED=""
          for result_var in GITLEAKS TRUFFLEHOG TRIVY_FS TRIVY_CONFIG TRIVY_IMAGE; do
            val="${!result_var}"
            if [ "$val" = "failure" ]; then
              FAILED="$FAILED $result_var"
            fi
          done

          if [ -n "$FAILED" ]; then
            echo "::error::Security gate FAILED:${FAILED}"
            exit 1
          fi

          echo "✅ Security gate passed"