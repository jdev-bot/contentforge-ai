name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

env:
  SEVERITY_FAIL: high

jobs:
  # ── A. Secret Scanning ──────────────────────────────────────────────

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml

  trufflehog:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (PR — diff only)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --exclude-paths=.github/workflows/.trufflehogignore

      - name: TruffleHog (full repo)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --exclude-paths=.github/workflows/.trufflehogignore

  # ── B. Static Application Security Testing ──────────────────────────

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/python
            p/typescript
            p/react
            p/owasp-top-ten
            p/jwt
            p/secrets
          generateSarif: true
          outputFormat: sarif
          outputPath: semgrep-results.sarif

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  bandit:
    name: SAST (Bandit — Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit bandit-sarif-formatter

      - name: Run Bandit
        run: |
          bandit -r app/ -f sarif -o bandit-results.sarif --severity-level ${{ env.SEVERITY_FAIL }} || true
          bandit -r app/ -f txt || true

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./src/backend/bandit-results.sarif
          category: bandit

  # ── C. Dependency & Supply-Chain Scanning ───────────────────────────

  pip-audit:
    name: Dependency Scan (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit
        run: pip-audit -r requirements.txt --desc || true

  npm-audit:
    name: Dependency Scan (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate || true

  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: ""
          vulnerability-check: true
          license-check: false

  osv-scanner:
    name: Dependency Scan (OSV — all ecosystems)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OSV Scanner
        uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@main
        with:
          scan-args: |-
            --lockfile=./src/frontend/package-lock.json
            --config=.osv-scanner.toml

  # ── D. Filesystem / Config / IaC Scanning ────────────────────────────

  trivy-fs:
    name: Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-fs-results.sarif
          skip-dirs: node_modules,venv,.venv,.next,__pycache__

      - name: Upload Trivy FS SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

  trivy-config:
    name: IaC / Misconfig Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-config-results.sarif
          skip-dirs: node_modules,venv,.venv,.next,__pycache__

      - name: Upload Trivy Config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config

  checkov:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: docker-compose,kubernetes,github_actions
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true
          skip_check: CKV_DOCKER_3  # Running as root in dev containers is acceptable

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ── E. Container Image Scanning ─────────────────────────────────────

  trivy-image:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f infra/docker/Dockerfile.backend -t contentforge-ai:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: contentforge-ai:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-image-results.sarif
          ignore-unfixed: true

      - name: Upload Trivy Image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

  # ── Security Gate Summary ───────────────────────────────────────────

  security-gate:
    name: Security Gate
    if: always()
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - trufflehog
      - semgrep
      - codeql
      - bandit
      - pip-audit
      - npm-audit
      - osv-scanner
      - trivy-fs
      - trivy-config
      - trivy-image
    steps:
      - name: Check security job results
        env:
          GITLEAKS: ${{ needs.gitleaks.result }}
          TRUFFLEHOG: ${{ needs.trufflehog.result }}
          SEMGREP: ${{ needs.semgrep.result }}
          CODEQL: ${{ needs.codeql.result }}
          BANDIT: ${{ needs.bandit.result }}
          PIP_AUDIT: ${{ needs.pip-audit.result }}
          NPM_AUDIT: ${{ needs.npm-audit.result }}
          OSV_SCANNER: ${{ needs.osv-scanner.result }}
          TRIVY_FS: ${{ needs.trivy-fs.result }}
          TRIVY_CONFIG: ${{ needs.trivy-config.result }}
          TRIVY_IMAGE: ${{ needs.trivy-image.result }}
        run: |
          echo "## Security Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${GITLEAKS} |" >> $GITHUB_STEP_SUMMARY
          echo "| TruffleHog | ${TRUFFLEHOG} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep | ${SEMGREP} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${CODEQL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | ${BANDIT} |" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit | ${PIP_AUDIT} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm-audit | ${NPM_AUDIT} |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV Scanner | ${OSV_SCANNER} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS | ${TRIVY_FS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Config | ${TRIVY_CONFIG} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image | ${TRIVY_IMAGE} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any critical scan failed
          FAILED=""
          for result_var in GITLEAKS TRUFFLEHOG SEMGREP CODEQL BANDIT TRIVY_FS TRIVY_CONFIG TRIVY_IMAGE; do
            val="${!result_var}"
            if [ "$val" = "failure" ]; then
              FAILED="$FAILED $result_var"
            fi
          done

          if [ -n "$FAILED" ]; then
            echo "::error::Security gate FAILED:${FAILED}"
            exit 1
          fi

          echo "✅ Security gate passed"