name: Backend Tests

on:
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv /home/claw/actions-runner/venv
          source /home/claw/actions-runner/venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          cd src/backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov pytest-timeout

      - name: Run tests with coverage
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          cd src/backend
          pytest tests/ -v --timeout=60 --cov=app --cov-report=xml --cov-report=term \
            --ignore=tests/test_sso.py \
            --ignore=tests/test_websocket.py \
            --ignore=tests/test_security_advanced.py \
            --ignore=tests/deep_system_test.py \
            --ignore=tests/deep_system_test_test.py
        env:
          PYTHONPATH: .
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-key
          GROQ_API_KEY: test-key

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./src/backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  lint-backend:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install linting tools
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          pip install flake8 black isort

      - name: Run flake8
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          cd src/backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check Black formatting
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          cd src/backend && black --check --diff .
        continue-on-error: true

      - name: Check isort
        run: |
          source /home/claw/actions-runner/venv/bin/activate
          cd src/backend && isort --check-only --diff .
        continue-on-error: true