[tool.black]
line-length = 88
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
timeout = 60
asyncio_mode = "strict"
filterwarnings = [
    "ignore::DeprecationWarning:gotrue",
    "ignore::PendingDeprecationWarning:multipart",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false