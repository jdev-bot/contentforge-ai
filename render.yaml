# Render Blueprint for ContentForge AI — Staging
# Deploy via: https://dashboard.render.com/blueprints

services:
  # FastAPI Backend Service
  - type: web
    name: contentforge-ai-api
    runtime: python
    repo: "https://github.com/jdev-bot/contentforge-ai"
    buildCommand: "pip install -r src/backend/requirements.txt"
    startCommand: "cd src/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    branch: main
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: APP_ENV
        value: staging
      - key: APP_URL
        value: https://contentforge-ai-api.onrender.com
      - key: NEXT_PUBLIC_SIGNUP_ENABLED
        value: "false"
      # Database - Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # AI - Groq
      - key: GROQ_API_KEY
        sync: false
      # Email - Resend
      - key: RESEND_API_KEY
        sync: false
      # Redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: contentforge-ai-redis
          property: connectionString
      # CORS
      - key: CORS_ORIGINS
        value: '["https://contentforge-ai.vercel.app"]'
      # Security (auto-generated)
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

  # Redis for Celery task queue
  - type: redis
    name: contentforge-ai-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  # Background Worker (Celery)
  - type: worker
    name: contentforge-ai-worker
    runtime: python
    repo: "https://github.com/jdev-bot/contentforge-ai"
    buildCommand: "pip install -r src/backend/requirements.txt"
    startCommand: "cd src/backend && celery -A app.celery worker --loglevel=info --concurrency=2"
    plan: free
    branch: main
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: APP_ENV
        value: staging
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: contentforge-ai-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true