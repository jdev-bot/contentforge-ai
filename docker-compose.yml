version: '3.8'

services:
  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: contentforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contentforge-network

  # PostgreSQL database (optional, for local development)
  db:
    image: postgres:15-alpine
    container_name: contentforge-db
    environment:
      POSTGRES_USER: contentforge
      POSTGRES_PASSWORD: contentforge
      POSTGRES_DB: contentforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contentforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contentforge-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: contentforge-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://contentforge:contentforge@db:5432/contentforge
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    env_file:
      - .env
    volumes:
      - ./src/backend:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - contentforge-network

  # Celery Worker
  worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: contentforge-worker
    environment:
      - DATABASE_URL=postgresql://contentforge:contentforge@db:5432/contentforge
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    env_file:
      - .env
    volumes:
      - ./src/backend:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: celery -A app.core.celery worker --loglevel=info
    networks:
      - contentforge-network

  # Celery Beat (scheduler)
  beat:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: contentforge-beat
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    env_file:
      - .env
    volumes:
      - ./src/backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.core.celery beat --loglevel=info
    networks:
      - contentforge-network

  # Frontend (Next.js)
  frontend:
    image: node:20-alpine
    container_name: contentforge-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - .env
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - contentforge-network

volumes:
  redis-data:
  postgres-data:

networks:
  contentforge-network:
    driver: bridge
