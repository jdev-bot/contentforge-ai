# ContentForge AI - Local Development Docker Compose
# This file sets up all external services for local development

version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: contentforge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contentforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - contentforge-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: contentforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_redis_pass_2026}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_pass_2026}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - contentforge-network

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: contentforge-n8n
    environment:
      # Basic n8n config
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "admin"
      N8N_BASIC_AUTH_PASSWORD: "admin"
      
      # Database config
      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_HOST: "postgres"
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: "n8n"
      DB_POSTGRESDB_USER: "postgres"
      DB_POSTGRESDB_PASSWORD: "postgres"
      
      # Execution config
      EXECUTIONS_MODE: "regular"
      EXECUTIONS_DATA_SAVE_ON_ERROR: "all"
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: "all"
      
      # Webhook config
      WEBHOOK_URL: "http://localhost:5678"
      
      # Timezone
      GENERIC_TIMEZONE: "UTC"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contentforge-network

  # Optional: MailHog for testing emails
  mailhog:
    image: mailhog/mailhog:latest
    container_name: contentforge-mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - contentforge-network

  # Optional: MinIO for S3-compatible object storage (for file uploads)
  minio:
    image: minio/minio:latest
    container_name: contentforge-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - contentforge-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  minio_data:
    driver: local

networks:
  contentforge-network:
    driver: bridge
